baseURL: "https://taha-husain.github.io/"
title: Taha Husain
publishDir: "docs"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

services:
    googleAnalytics:
        ID: G-EMFCZ33WZB

minify:
    disableXML: true
    minifyOutput: true

params:
    author: Taha Husain
    description: "Software Engineer & Student of Music"
    intro: |
        Hi, I'm Taha — a software engineer who loves building things on the web.
        I write about React, Rails, and occasionally music.
    avatarUrl: /avatar.jpg
    socialLinks:
        - name: GitHub
          url: "https://github.com/taha-husain"
          icon: github
        - name: LinkedIn
          url: "https://linkedin.com/in/tahahussain18"
          icon: linkedin
        - name: Instagram
          url: "https://www.instagram.com/tahahussain18/"
          icon: instagram
        - name: YouTube
          url: "https://www.youtube.com/channel/UClzJVBAHj_36wVxpc7-99hQ"
          icon: youtube
        - name: Email
          url: "mailto:tahahussain18@gmail.com"
          icon: email

menu:
    main:
        - name: Blog
          url: /posts/
          weight: 10
        - name: Portfolio
          url: /portfolio/
          weight: 20
        - name: Resume
          url: /resume/
          weight: 30

taxonomies:
    tag: tags

outputs:
    home:
        - HTML
        - RSS

markup:
    goldmark:
        renderer:
            unsafe: true
