baseURL: "https://taha-husain.github.io/"
title: Taha Husain
publishDir: "docs"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

services:
    googleAnalytics:
        ID: G-EMFCZ33WZB

minify:
    disableXML: true
    minifyOutput: true

params:
    author: Taha Husain
    description: "Senior Software Engineer based in Berlin"
    intro: |
        Hi, I'm Taha — a senior software engineer based in Berlin with 11+ years of experience building backend-heavy web applications.
        I specialise in Ruby on Rails, distributed systems, and AWS. I also write about technology, and occasionally music.
    avatarUrl: /avatar.jpg
    socialLinks:
        - name: GitHub
          url: "https://github.com/taha-husain"
          icon: github
        - name: LinkedIn
          url: "https://linkedin.com/in/tahahussain18"
          icon: linkedin
        - name: Email
          url: "mailto:tahahussain18@gmail.com"
          icon: email

menu:
    main:
        - name: Blog
          url: /posts/
          weight: 10
        - name: Portfolio
          url: /portfolio/
          weight: 20
        - name: Resume
          url: /resume/
          weight: 30

taxonomies:
    tag: tags

outputs:
    home:
        - HTML
        - RSS

markup:
    goldmark:
        renderer:
            unsafe: true
