baseURL: "https://taha-husain.github.io/"
title: Taha Husain
publishDir: "docs"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

services:
    googleAnalytics:
        ID: G-EMFCZ33WZB

minify:
    disableXML: true
    minifyOutput: true

params:
    author: Taha Husain
    description: "Senior Software Engineer based in Berlin"
    intro: |
        Hi, I'm Taha — a software engineer in Berlin who builds web applications.
        Outside work, I'm an aspiring Indian classical violinist, a home-chef, and a juggler. I enjoy taking the scenic routes in new countries, and I love to hike, swim, or workout on weekends.
    avatarUrl: /avatar.jpg
    socialLinks:
        - name: GitHub
          url: "https://github.com/taha-husain"
          icon: github
        - name: LinkedIn
          url: "https://linkedin.com/in/tahahussain18"
          icon: linkedin
        - name: Email
          url: "mailto:tahahussain18@gmail.com"
          icon: email

menu:
    main:
        - name: Blog
          url: /posts/
          weight: 10
        - name: Portfolio
          url: /portfolio/
          weight: 20
        - name: Resume
          url: /resume/
          weight: 30

taxonomies:
    tag: tags

outputs:
    home:
        - HTML
        - RSS

markup:
    goldmark:
        renderer:
            unsafe: true
